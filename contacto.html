<section class="contact-section">
  <h2 class="section-title">¿Tienes una sugerencia, consulta o reclamo?</h2>
  <p class="section-subtitle">Estamos aquí para escucharte. Completa el formulario y te responderemos a la brevedad.</p>

  <div class="contact-grid">
    
    <!-- FORMULARIO -->
    <div class="contact-form-wrap">
      <form class="contact-form" action="https://formspree.io/f/xeeralre" method="POST">

        <input type="text" name="name" placeholder="Tu nombre" required>

        <input type="email" name="email" placeholder="Tu correo electrónico" required>

        <select name="topic" required>
          <option value="" disabled selected>Selecciona tipo de mensaje</option>
          <option value="sugerencia">Sugerencia</option>
          <option value="consulta">Consulta</option>
          <option value="reclamo">Reclamo</option>
        </select>

        <textarea name="message" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>

        <button type="submit">Enviar mensaje</button>

      </form>
    </div>

    <!-- INFO CONTACTO -->
    <div class="contact-info">

<!-- TRADUCTOR OCULTO -->
<div id="google_translate_element" style="display:none"></div>

<script>

function googleTranslateElementInit(){
new google.translate.TranslateElement(
{pageLanguage:'es'},
'google_translate_element'
);
}

function translatePage(lang){
let select = document.querySelector(".goog-te-combo");
if(select){
select.value = lang;
select.dispatchEvent(new Event("change"));
}
}

</script>
